<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Angular -->
    <meta charset="utf-8" />
    <title>reelscore</title>
    <base href="/" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <!-- Angular Material -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />

    <!-- Angular PWA -->
    <link rel="manifest" href="manifest.webmanifest" />

    <!-- Apple add to the home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <!-- Apple changing the status bar appearance -->
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <!-- Apple changing the status bar app title -->
    <meta name="apple-mobile-web-app-title" content="reelscore" />

    <!-- Android add to the home screen -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- OptimizedImageComponent - fix NG02956 (NgOptimizedImage) -->
    <link rel="preconnect" href="https://media.api-sports.io" />
    <link rel="preconnect" href="https://media-2.api-sports.io" />
    <link rel="preconnect" href="https://media-3.api-sports.io" />

    <!-- App initializion loading styles -->
    <style>
      :root {
        --app-loader-color: #e5b648;
        --app-loader-track: #e9ecef;
        --app-initializer-fade-duration: 300ms;

        @media (prefers-color-scheme: dark) {
          --app-loader-track: #343435;
        }
      }

      .root-component {
        z-index: 0;
        position: relative;
      }

      .app-initializer {
        position: fixed;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        gap: 1rem;
        z-index: 201;
        background: var(--rs-color-bg);

        opacity: 1;
        visibility: visible;
        transition: opacity var(--app-initializer-fade-duration) ease,
          visibility 0ms linear var(--app-initializer-fade-duration);
      }

      .app-initializer--hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .app-initializer-logo {
        width: 64px;
        height: 64px;
        object-fit: contain;
        content: url('/assets/icons/logo-black.png');

        @media (prefers-color-scheme: dark) {
          content: url('/assets/icons/logo-white.png');
        }
      }

      .progress {
        position: relative;
        overflow: hidden;
        width: 200px;
        height: 6px;
        background-color: var(--app-loader-track);
        border-radius: 999px;

        opacity: 0;
        animation: show-progress 250ms ease 200ms forwards;
      }

      .progress-bar {
        position: absolute;
        inset-block: 0;
        width: 40%;
        border-radius: inherit;
        background: var(--app-loader-color);
        animation: app-loader-progress 1.1s ease-in-out infinite;
      }

      @keyframes show-progress {
        to {
          opacity: 1;
        }
      }

      @keyframes app-loader-progress {
        0% {
          left: -40%;
        }

        100% {
          left: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div id="app-initializer" class="app-initializer">
      <img class="app-initializer-logo" alt="Reelscore" />

      <div class="progress" aria-label="App wird geladen">
        <div class="progress-bar"></div>
      </div>
    </div>
    <rs-root class="root-component"></rs-root>
    <noscript>
      Please enable JavaScript to continue using this application.
    </noscript>
  </body>
</html>
